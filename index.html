<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 min-h-screen">

    <section id="login-page" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-xl shadow-lg border border-slate-100 w-full max-w-md text-center">
            <img src="assets/github-logo.png" alt="Github Logo" class="w-16 mx-auto mb-4">
            <h1 class="text-2xl font-bold text-slate-800">GitHub Issues Tracker</h1>
            <p class="text-slate-400 text-sm mb-6">Sign in to manage your issues</p>
            <h2>Username</h2>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Username" class="input input-bordered w-full" />
                <h3>Default: admin</h3>
                <h2>Password</h2>
                <input type="password" id="password" placeholder="Password" class="input input-bordered w-full" />
                <h3>Default: admin123</h3>
                <button onclick="handleLogin()" class="btn btn-primary w-full bg-indigo-600 border-none hover:bg-indigo-700">Sign In</button>
            </div>
            <div class="mt-8 p-4 bg-slate-50 rounded-lg text-xs text-left">
                <p class="text-slate-500 mb-1 italic text-center">Demo Credentials:</p>
                <p><strong>Username:</strong> admin <br> <strong>Password:</strong> admin123</p>
            </div>
        </div>
    </section>

    <section id="main-dashboard" class="hidden">
        <nav class="bg-white border-b border-slate-200 px-6 py-3 flex flex-wrap justify-between items-center sticky top-0 z-50">
            <div class="flex items-center gap-2">
                <i class="fa-brands fa-github text-2xl"></i>
                <span class="font-bold text-lg text-slate-800">GitHub Issues Tracker</span>
            </div>
            <div class="flex gap-2 w-full md:w-auto mt-3 md:mt-0">
                <div class="relative flex-grow">
                    <input type="text" id="search-input" onkeyup="handleSearch()" placeholder="Search issues..." class="input input-sm input-bordered w-full md:w-64 pl-8" />
                    <i class="fa-solid fa-magnifying-glass absolute left-2.5 top-2 text-slate-400 text-xs"></i>
                </div>
                <button onclick="document.getElementById('new_issue_modal').showModal()" class="btn btn-sm btn-primary bg-indigo-600 border-none">+ New Issue</button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-6">
            <div class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm mb-6">
                <div class="flex gap-2 mb-6">
                    <button onclick="filterByTab('all', this)" class="tab-btn active-tab">All</button>
                    <button onclick="filterByTab('open', this)" class="tab-btn">Open</button>
                    <button onclick="filterByTab('closed', this)" class="tab-btn">Closed</button>
                </div>

                <div class="flex justify-between items-center border-t border-slate-100 pt-4">
                    <div class="flex items-center gap-3">
                        <div class="p-3 bg-indigo-50 rounded-lg text-indigo-600">
                            <i class="fa-solid fa-list-check text-xl"></i>
                        </div>
                        <div>
                            <h2 class="font-bold text-slate-800 text-lg"><span id="issue-count">0</span> Issues</h2>
                            <p class="text-xs text-slate-400">Track and manage project issues</p>
                        </div>
                    </div>
                    <div class="flex gap-4 text-xs font-bold uppercase tracking-wider">
                        <span class="text-emerald-500 flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-emerald-500"></span> Open</span>
                        <span class="text-indigo-500 flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-indigo-500"></span> Closed</span>
                    </div>
                </div>
            </div>

            <div id="loading-spinner" class="hidden flex justify-center py-20">
                <span class="loading loading-spinner loading-lg text-primary"></span>
            </div>
            
            <div id="issues-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </main>
    </section>

    <dialog id="issue_modal" class="modal">
        <div class="modal-box max-w-2xl p-8" id="modal-content"></div>
        <form method="dialog" class="modal-backdrop"><button>close</button></form>
    </dialog>

    <dialog id="new_issue_modal" class="modal">
        <div class="modal-box">
            <h3 class="font-bold text-lg mb-4">Create New Issue</h3>
            <div class="space-y-3">
                <input id="new-title" type="text" placeholder="Title" class="input input-bordered w-full" />
                <textarea id="new-desc" placeholder="Description" class="textarea textarea-bordered w-full"></textarea>
                <select id="new-priority" class="select select-bordered w-full">
                    <option value="High">High</option>
                    <option value="Medium" selected>Medium</option>
                    <option value="Low">Low</option>
                </select>
                <div class="modal-action">
                    <button onclick="addNewIssue()" class="btn btn-primary">Create</button>
                    <form method="dialog"><button class="btn">Cancel</button></form>
                </div>
            </div>
        </div>
    </dialog>

    <script src="app.js"></script>
</body>
</html>
